appId: com.tidy-desktop.app
productName: tidy-desktop
directories:
  output: release
files:
  - dist/**/*
  - build/icon-256.png
  - package.json
extraResources:
  - from: build/app-icon.ico
    to: build/app-icon.ico
win:
  icon: build/app-icon.ico
  target:
    - target: nsis
      arch:
        - x64
  sign: null
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  publisherName: null
nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  include: build/installer.nsh
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/app-icon.ico
  uninstallerIcon: build/app-icon.ico
  installerHeaderIcon: build/app-icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: tidy-desktop
